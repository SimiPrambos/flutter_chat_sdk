name: Publish

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  publish:
    name: Publish to pub.dev
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Required for OIDC-based pub.dev publishing

    environment: pub.dev # Must match the environment configured on pub.dev admin

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Validate package
        run: dart pub publish --dry-run

      - name: Publish
        run: dart pub publish -f
