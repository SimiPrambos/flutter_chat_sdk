name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement!
        Please check existing issues first to avoid duplicates.

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem are you trying to solve? What use case is this for?
      placeholder: I'm trying to do X but the current API doesn't support it because...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see added or changed?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches have you tried or considered?

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any other context, related issues, or code examples.
